<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARK QUANTUM LAB</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5; /* 이미지 배경과 자연스럽게 어울리는 밝은 회색 */
        }
        .image-container {
            max-width: 90%;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); /* 약간의 그림자 효과 추가 */
        }
    </style>
</head>
<body>
    <div class="image-container">
        <!-- 다운로드한 이미지 파일명으로 아래 src 값을 수정해 주세요 -->
        <img src="main-card.png" alt="QUANTUM LAB">
    </div>
</body>
</html>
