<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스타크 영재 파트너스 - 영재성 및 R&E 역량 진단</title>
    <!-- Chart.js CDN (결과 그래프용) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d0e12;
            --box-bg: #1a1c23;
            --gold: #d4af37;
            --text-main: #f0f0f0;
            --text-sub: #a0a0a0;
        }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        .header h1 {
            color: var(--gold);
            font-size: 24px;
            letter-spacing: 2px;
        }
        .header p {
            color: var(--text-sub);
            font-size: 14px;
            line-height: 1.6;
        }
        .category-title {
            color: var(--gold);
            font-size: 18px;
            margin-top: 40px;
            margin-bottom: 15px;
            border-left: 4px solid var(--gold);
            padding-left: 10px;
        }
        .question-box {
            background-color: var(--box-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .question-text {
            font-size: 15px;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .options label {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: var(--text-sub);
            cursor: pointer;
        }
        .options input[type="radio"] {
            margin-bottom: 5px;
            accent-color: var(--gold);
            transform: scale(1.2);
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--gold);
            color: #000;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            margin-top: 40px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-submit:hover {
            background-color: #b5952f;
        }
        #result-section {
            display: none;
            background-color: var(--box-bg);
            padding: 40px 20px;
            border-radius: 8px;
            margin-top: 40px;
            border: 1px solid var(--gold);
            text-align: center;
        }
        .chart-container {
            position: relative;
            margin: auto;
            height: 400px;
            width: 100%;
            max-width: 500px;
        }
        .result-text {
            margin-top: 30px;
            font-size: 15px;
            line-height: 1.8;
            text-align: left;
            color: var(--text-main);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>STARK GIFTED PARTNERS</h1>
        <h2>핵심 영재성 및 R&E 역량 자가 진단</h2>
        <p>각 문항을 읽고, 평소 나의 모습과 가장 가깝다고 생각하는 점수를 선택해 주세요.<br>
        (1점: 전혀 아니다 ~ 5점: 매우 그렇다)</p>
    </div>

    <form id="surveyForm">
        <div id="questions-container"></div>
        <button type="button" class="btn-submit" onclick="calculateResult()">진단 결과 분석하기</button>
    </form>

    <div id="result-section">
        <h2 style="color: var(--gold);">[ 분석 완료 ] 나의 영재성 프로파일</h2>
        <div class="chart-container">
            <canvas id="resultChart"></canvas>
        </div>
        <div class="result-text" id="result-feedback">
            <!-- 결과 텍스트가 여기에 표시됩니다 -->
        </div>
    </div>
</div>

<script>
    // 중학교 1학년 수준에 맞춘 40개의 질문 리스트 (4개 영역 x 10문제)
    const questions = [
        // 영역 1: 학술적 호기심 & 과제 집착력 (Q1 ~ Q10)
        { category: 0, text: "내가 좋아하는 과학이나 수학 주제가 생기면 시간 가는 줄 모르고 찾아본다." },
        { category: 0, text: "어려운 수학 문제나 과학 원리를 만났을 때, 정답을 볼 때까지 포기하고 싶지 않다." },
        { category: 0, text: "학교에서 안 배운 내용이라도 궁금하면 유튜브나 책을 찾아본다." },
        { category: 0, text: "한 가지 생각에 푹 빠져서 밥 먹는 것이나 노는 것을 잊어버린 적이 있다." },
        { category: 0, text: "남들이 다 포기한 어려운 숙제나 퍼즐을 끝까지 풀었을 때 큰 뿌듯함을 느낀다." },
        { category: 0, text: "궁금한 점이 생기면 선생님이나 부모님께 계속 질문해서 답을 알아낸다." },
        { category: 0, text: "쉬운 문제 10개를 푸는 것보다, 아주 어려운 문제 1개를 푸는 것이 더 재밌다." },
        { category: 0, text: "좋아하는 실험이나 탐구를 할 때는 피곤한 줄도 모른다." },
        { category: 0, text: "한 번 시작한 조립이나 만들기는 끝을 봐야 직성이 풀린다." },
        { category: 0, text: "내가 세운 목표를 달성하기 위해 늦게까지 잠을 안 자고 매달릴 수 있다." },

        // 영역 2: 비판적 & 논리적 사고력 (Q11 ~ Q20)
        { category: 1, text: "뉴스와 유튜브에서 어떤 주장을 들으면 '정말 그럴까?' 하고 먼저 의심해 본다." },
        { category: 1, text: "친구나 다른 사람의 의견을 들을 때 앞뒤가 안 맞는 점을 잘 찾아낸다." },
        { category: 1, text: "복잡한 문제를 보면 나만의 규칙이나 순서를 만들어서 정리하는 것을 좋아한다." },
        { category: 1, text: "'무조건 외워라'라는 말보다 '왜 그렇게 되는지' 이유를 아는 것이 더 좋다." },
        { category: 1, text: "여러 가지 현상들 사이에서 공통점이나 규칙을 찾는 것을 잘한다." },
        { category: 1, text: "어떤 결과가 나오면, 그 원인이 무엇일지 단계별로 추리해보는 것을 좋아한다." },
        { category: 1, text: "내 의견을 말할 때 그냥 우기지 않고 확실한 근거나 이유를 댄다." },
        { category: 1, text: "학교에서 배우는 과학 법칙들이 어떻게 만들어졌는지 증명해 보는 것이 재밌다." },
        { category: 1, text: "토론할 때 논리적으로 반박하는 것을 즐긴다." },
        { category: 1, text: "글을 읽거나 말을 들을 때, 중요한 핵심과 중요하지 않은 것을 잘 구별한다." },

        // 영역 3: 창의성 & 메타인지 (Q21 ~ Q30)
        { category: 2, text: "공부하다가 막히면, 내가 무엇을 모르고 있는지 정확히 알고 있다." },
        { category: 2, text: "문제를 풀 때 남들이 다 하는 방법 말고 나만의 새로운 방법으로 푸는 것을 좋아한다." },
        { category: 2, text: "과제나 보고서를 제출하기 전에, 스스로 부족한 점을 찾아서 고친다." },
        { category: 2, text: "서로 전혀 상관없어 보이는 두 가지 물건이나 아이디어를 합쳐서 상상하곤 한다." },
        { category: 2, text: "내가 세운 계획이 잘 안 맞으면, 내 상황에 맞게 계획을 다시 짠다." },
        { category: 2, text: "틀린 문제가 있으면 왜 틀렸는지 내 생각의 과정을 되짚어 본다." },
        { category: 2, text: "엉뚱한 상상이나 '만약에 ~라면 어떨까?'라는 생각을 자주 한다." },
        { category: 2, text: "친구들이 어려워하는 문제를 전혀 다른 각도에서 설명해 준 적이 있다." },
        { category: 2, text: "내가 잘하는 과목과 부족한 과목을 알고, 그에 맞게 공부 시간을 조절한다." },
        { category: 2, text: "과학 상상화나 발명품 대회에서 독창적이라는 칭찬을 받은 적이 있다." },

        // 영역 4: 탐구 & 데이터 문해력 (Q31 ~ Q40)
        { category: 3, text: "복잡한 표나 그래프를 보면 그 안에 숨겨진 의미나 규칙을 찾는 것이 재미있다." },
        { category: 3, text: "과학 실험을 할 때, 결과를 눈으로 직접 확인해야 직성이 풀린다." },
        { category: 3, text: "인터넷에서 조사한 숫자나 통계 자료를 표나 그래프로 예쁘게 정리할 수 있다." },
        { category: 3, text: "내 예상이 틀렸더라도, 실험 결과를 조작하지 않고 사실대로 인정한다." },
        { category: 3, text: "날씨 변화나 식물 키우기처럼 매일매일 기록해서 변화를 살펴보는 것을 좋아한다." },
        { category: 3, text: "어려운 설명글보다 그래프나 그림으로 설명되어 있을 때 훨씬 이해가 잘 된다." },
        { category: 3, text: "친구들에게 무언가를 설명할 때, 정확한 수치나 통계 자료를 보여주면서 말하는 편이다." },
        { category: 3, text: "컴퓨터로 숫자를 다루거나 데이터를 분석하는 것에 흥미가 있다." },
        { category: 3, text: "하나의 현상을 관찰하기 위해 조건을 바꿔가며 여러 번 실험해 보고 싶다." },
        { category: 3, text: "어떤 정보를 볼 때 과거부터 지금까지 어떻게 변해왔는지 흐름을 보는 것을 좋아한다." }
    ];

    const categoryNames = [
        "학술적 호기심 & 과제 집착력",
        "비판적 & 논리적 사고력",
        "창의성 & 메타인지",
        "탐구 & 데이터 문해력"
    ];

    // 질문 HTML 동적 생성
    const container = document.getElementById("questions-container");
    let currentCategory = -1;

    questions.forEach((q, index) => {
        if (q.category !== currentCategory) {
            currentCategory = q.category;
            const title = document.createElement("div");
            title.className = "category-title";
            title.innerText = "■ " + categoryNames[currentCategory];
            container.appendChild(title);
        }

        const box = document.createElement("div");
        box.className = "question-box";
        box.innerHTML = `
            <div class="question-text"><strong>Q${index + 1}.</strong> ${q.text}</div>
            <div class="options">
                <label><input type="radio" name="q${index}" value="1">전혀 아니다(1)</label>
                <label><input type="radio" name="q${index}" value="2">아니다(2)</label>
                <label><input type="radio" name="q${index}" value="3">보통이다(3)</label>
                <label><input type="radio" name="q${index}" value="4">그렇다(4)</label>
                <label><input type="radio" name="q${index}" value="5">매우 그렇다(5)</label>
            </div>
        `;
        container.appendChild(box);
    });

    let chartInstance = null;

    function calculateResult() {
        const scores = [0, 0, 0, 0];
        let answeredCount = 0;

        for (let i = 0; i < questions.length; i++) {
            const radios = document.getElementsByName("q" + i);
            let answered = false;
            for (let j = 0; j < radios.length; j++) {
                if (radios[j].checked) {
                    scores[questions[i].category] += parseInt(radios[j].value);
                    answered = true;
                    answeredCount++;
                    break;
                }
            }
        }

        if (answeredCount < questions.length) {
            alert("모든 문항에 답해주세요. (현재 " + answeredCount + " / 40문항 완료)");
            return;
        }

        // 결과 영역 표시
        document.getElementById("result-section").style.display = "block";
        document.getElementById("result-section").scrollIntoView({ behavior: 'smooth' });

        // 피드백 텍스트 생성
        const maxScore = Math.max(...scores);
        const topCategoryIndex = scores.indexOf(maxScore);
        const topCategoryName = categoryNames[topCategoryIndex];

        let feedbackHtml = `<p>수고하셨습니다. 학생의 진단 결과, <strong>[${topCategoryName}]</strong> 역량이 가장 돋보입니다.</p>`;
        feedbackHtml += `<p>학생은 단순한 암기를 넘어 스스로 질문을 던지고 데이터를 통해 세상을 이해할 준비가 되어 있습니다. 스타크 영재 파트너스와 함께 학생의 잠재력을 진짜 학술적 결과물(논문 및 R&E)로 폭발시켜 보시기 바랍니다.</p>`;
        document.getElementById("result-feedback").innerHTML = feedbackHtml;

        // 방사형 그래프 그리기 (Chart.js)
        const ctx = document.getElementById('resultChart').getContext('2d');
        
        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: categoryNames,
                datasets: [{
                    label: '영재성 역량 점수 (50점 만점)',
                    data: scores,
                    backgroundColor: 'rgba(212, 175, 55, 0.2)',
                    borderColor: 'rgba(212, 175, 55, 1)',
                    pointBackgroundColor: 'rgba(212, 175, 55, 1)',
                    pointBorderColor: '#fff',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: 'rgba(212, 175, 55, 1)',
                    borderWidth: 2
                }]
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        pointLabels: { color: '#f0f0f0', font: { size: 14 } },
                        ticks: {
                            min: 0,
                            max: 50,
                            stepSize: 10,
                            display: false
                        }
                    }
                },
                plugins: {
                    legend: {
                        labels: { color: '#d4af37' }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
